name: CI/CD FTP Deployment to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to cPanel via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to cPanel (FTP Sync)
        id: ftp_deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR || './' }}
          dangerous-clean-cut: true
          # Exclude configuration files, cPanel system directories, and GitHub tracking folders
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
            .cpanel/**
            .well-known/**
            logs/**
            tmp/**
            mail/**
            ssl/**
            cgi-bin/**
            .env
            .env.*
            *.zip
            *.tar
            *.gz
            *.rar
